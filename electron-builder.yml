appId: com.apdev.blockhaven-launcher
productName: BlockHaven Launcher
copyright: Copyright © 2026 AP Dev Solutions LLC

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - resources/**/*

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icon.icns
  category: public.app-category.games

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: resources/icon.png
  category: Game

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
