appId: com.apdev.blockhaven-launcher
productName: BlockHaven Launcher
copyright: Copyright © 2026 AP Dev Solutions LLC

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - resources/**/*

icon: resources/icon.png

win:
  target:
    - target: nsis
      arch: [x64]

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.games

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Game

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
