name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env
        shell: bash
        run: |
          echo "MS_CLIENT_ID=${{ secrets.MS_CLIENT_ID }}" >> .env
          echo "LOG_LEVEL=info" >> .env
          echo "BLOCKHAVEN_SERVER_HOST=${{ secrets.BLOCKHAVEN_SERVER_HOST || 'play.blockhaven.net' }}" >> .env
          echo "BLOCKHAVEN_SERVER_PORT=${{ secrets.BLOCKHAVEN_SERVER_PORT || '25565' }}" >> .env

      - name: Build
        run: pnpm build

      - name: Package
        run: pnpm package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.exe
            release/**/*.dmg
            release/**/*.AppImage
            release/**/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
